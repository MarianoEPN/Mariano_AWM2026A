<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReplicarCSS</title>
    <style>
        h1{
            background-color: black; 
            color: white; 
            font-family: sans-serif;
        }
        h2{
            background-color: blue; 
            color: white; 
            font-style: italic; 
            text-align: center; 
            font-family: sans-serif;
        }
        h3{
            background-color: aqua; 
            color: blue; 
            text-decoration: underline; 
            text-align: end; 
        }
        div{
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div>
    <h1>The<span style="color: aqua;">CornerStore</span></h1>
    </div>
    <div>
    <h2>Offered products:</h2>
    </div>
    <div>
    <h3>Contact Us</h3>
    </div>
</body>
</html>
