<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
    <h1>Registration Form</h1>
    <div>
        <label for="FirstName">First Name:</label>
        <input type="text" name="FirstName" id="FirstName"/>
    </div>
    <div>
        <label for="LastName">Last Name:</label>
        <input type="text" name="LastName" id="LastName"/>
    </div>
    <div>
        <label for="Email">Email Address:</label>
        <input type="text" name="Email" id="Email"/>
    </div>
    <div>
        <label for="Pass">Password:</label>
        <input type="password" name="Pass" id="Pass"/>
    </div>
    <div>
        <label for="ConfirmPass">Confirm Password:</label>
        <input type="password" name="ConfirmPass" id="ConfirmPass"/>
    </div>
    <div>
        <label for="Birthday">Birthday:</label>
        <input type="date" name="Birthday" id="Birthday"/>
    </div>
    <div>
        <label for="GenderIdentity">GenderIdentity:</label>
        <br/>
        <input type="radio" name="Male" id="Male"/>
        <label for="Male">Male</label>
        <input type="radio" name="Female" id="Female"/>
        <label for="Female">Female</label>
        <input type="radio" name="Nonbinary" id="Nonbinary"/>
        <label for="Nonbinary">Non-Binary</label>
        <input type="radio" name="Iprefer" id="Iprefer"/>
        <label for="Iprefer">I prefer not to answer</label>
    </div>
    <div>
        <label for="textarea">A short description about myself</label>
        <textarea id="textarea" name="textarea"></textarea>
    </div>

    </form>
</body>
</html>
